<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình hiển thị gọi số tự động - UBND xã Đan Hải</title>
    <style>
        /* Tối ưu hóa không gian hiển thị, chống tràn màn hình */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #0c1a30; 
            color: #fff; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        
        /* Thanh tiêu đề trên cùng cố định chiều cao */
        .header { 
            background-color: #1e3a8a; 
            text-align: center; 
            padding: 15px; 
            border-bottom: 5px solid #f59e0b;
            flex-shrink: 0;
        }
        .header h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; color: #ffffff; }
        .header h2 { font-size: 1.5rem; color: #f59e0b; margin-top: 5px; }

        /* Vùng chứa các quầy: Tự động kéo giãn lấp đầy phần diện tích còn lại của Tivi */
        .grid-container { 
            flex-grow: 1;
            padding: 15px;
            display: grid;
            /* Tự động tính số cột dựa trên chiều rộng màn hình, tối thiểu 350px một ô */
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            /* Tự động chia đều chiều cao các ô để khít màn hình */
            grid-auto-rows: 1fr;
            gap: 15px;
            background-color: #09111e;
        }

        /* Khung của từng quầy */
        .quay-card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border-radius: 12px; 
            border: 2px solid #2e3d52; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            position: relative;
        }

        /* Hiệu ứng làm nổi bật quầy khi có lượt gọi mới */
        .quay-card.active {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59,130,246,0.6);
            animation: pulse 1.5s infinite alternate;
        }

        .quay-title { 
            font-size: 1.8rem; 
            color: #f59e0b; 
            font-weight: bold; 
            text-transform: uppercase;
            text-align: center;
        }

        .quay-linhvuc { 
            font-size: 1rem; 
            color: #94a3b8; 
            text-align: center;
            margin-top: 2px;
            /* Giới hạn chữ trong 2 dòng để không vỡ giao diện */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.6rem;
            line-height: 1.3;
        }

        /* Vùng hiển thị số thứ tự - tự động phóng to tối đa theo ô */
        .quay-number { 
            font-size: 5.5rem; 
            font-weight: bold; 
            color: #38bdf8; 
            margin: auto 0;
            text-shadow: 0 0 15px rgba(56,189,248,0.3);
        }

        .quay-badge {
            font-size: 1.2rem;
            color: #ffffff;
            background-color: #1e3a8a;
            padding: 6px 25px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>HỆ THỐNG GỌI
